<!DOCTYPE html>
<html>
<head>
    <title>Recipe Social Network - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Login page styling */
        .login-page{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#111,#1f1f1f);
        }

        .login-box{
            width:420px;
            background:#1b1b1b;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 25px rgba(255,165,0,0.15);
        }

        .login-box h1{
            color:orange;
            margin-bottom:15px;
        }

        .login-box p{
            color:#bbb;
            margin-bottom:25px;
        }

        .login-box input{
            width:100%;
            padding:14px;
            margin:12px 0;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
        }

        .login-box button{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:orange;
            font-weight:bold;
            cursor:pointer;
        }

        .form-link{
            margin-top:18px;
            display:block;
            color:#bbb;
            text-decoration:none;
        }
    </style>
</head>
<body>

    <!-- Main login section -->
    <div class="login-page">
        <div class="login-box">

            <!-- Website title -->
            <h1>Recipe Connect</h1>
            <p>Share recipes and connect with food lovers</p>

            <!-- User input fields -->
            <input type="text" placeholder="Enter username">
            <input type="password" placeholder="Enter password">

            <!-- Login button -->
            <button onclick="goToHome()">Login</button>

           
            <a class="form-link" href="https://docs.google.com/forms/d/e/1FAIpQLSe-RVDvGk35jMPwQelkbO9ZzLhHL5ZBQGtKi2zg7MKJF3SpMQ/viewform?usp=publish-editor">
                Register using google form
            </a>

        </div>
    </div>

    <script>
        /* Redirect to home page after login */
        function goToHome(){
            window.location.href = "index.html";
        }
    </script>

</body>
</html>

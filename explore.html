<!DOCTYPE html>
<html>
<head>
    <title>Recipe Social Network - Explore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation bar -->
    <nav>
        <div class="logo">Recipe Connect</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="explore.html">Explore</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <!-- Page heading -->
    <section class="hero">
        <h1>Explore Recipes</h1>
        <p>Search recipes by name</p>
    </section>

    <!-- Search input -->
    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search recipe..."
            onkeyup="searchRecipes()"
        >
    </div>

    <!-- Searchable recipe cards -->
    <div class="card-container" id="recipeContainer">

        <div class="card recipe-item">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop">
            <div class="card-content">
                <h3>Pizza</h3>
                <p>Italian baked dish with cheese.</p>
            </div>
        </div>

        <div class="card recipe-item">
            <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?q=80&w=1200&auto=format&fit=crop">
            <div class="card-content">
                <h3>Pasta</h3>
                <p>Creamy and delicious pasta.</p>
            </div>
        </div>

        <div class="card recipe-item">
            <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?q=80&w=1200&auto=format&fit=crop">
            <div class="card-content">
                <h3>Biryani</h3>
                <p>Spicy rice recipe.</p>
            </div>
        </div>

        <div class="card recipe-item">
            <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=1200&auto=format&fit=crop">
            <div class="card-content">
                <h3>Burger</h3>
                <p>Juicy burger with cheese.</p>
            </div>
        </div>

    </div>

    <footer>
        Explore Recipes
    </footer>

    <script src="script.js"></script>
</body>
</html>
